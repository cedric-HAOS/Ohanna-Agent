# -----------------------------------------------------------------------------
# Ohanna-Agent
# Production configuration for infra-01
# -----------------------------------------------------------------------------

version: 1

agent:
  name: Shikamaru
  environment: production

mqtt:
  host: ha-green.ohanna.lan
  port: 1883

logging:
  level: INFO

health:
  enabled: true
  interval_seconds: 30

plugins:
  enabled: true
  directory: plugins

vision:
  enabled: true
  observation_url: http://127.0.0.1:8000/api/observations
  infrastructure_url: http://127.0.0.1:8000/api/infrastructure
  timeout_seconds: 5.0