infrastructure:
  id: ohanna-house
  name: Ohanna House
  environment: production

metadata:
  version: "1.0"
  tags:
    - production
    - home

nodes:
  - id: infra-01
    name: INFRA-01
    description: Serveur principal de l'infrastructure Ohanna
    endpoint:
      type: ip
      address: 192.168.1.10

services:
  - id: dns-primary
    name: DNS principal
    type: dns
    node: infra-01
    port: 53