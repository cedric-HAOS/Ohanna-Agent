infrastructure:
  id: ohanna-house
  name: Ohanna House
  environment: production

metadata:
  version: "1.1"
  tags:
    - production
    - home

nodes:
  - id: infra-01
    name: INFRA-01
    description: Serveur infrastructure principal
    endpoint:
      type: ip
      address: 192.168.1.10

  - id: ha-01
    name: HA-01
    description: Instance Home Assistant principale
    endpoint:
      type: ip
      address: 192.168.1.20

services:
  - id: dns-primary
    name: DNS principal
    type: dns
    node: infra-01
    port: 53

  - id: mqtt-primary
    name: MQTT principal
    type: mqtt
    node: ha-01
    port: 1883

topology:
  metadata:
    description: Exemple de topologie physique complète.
    version: 1

  devices:
    - id: internet
      label: Internet
      kind: internet

    - id: router-01
      label: Routeur principal
      kind: router

    - id: infra-01
      label: INFRA-01
      kind: raspberry_pi
      node: infra-01
      metadata:
        role: infrastructure_server

    - id: ha-01
      label: HA-01
      kind: home_assistant
      node: ha-01
      metadata:
        role: home_automation_controller

  links:
    - id: internet-router-01
      source: internet
      target: router-01
      kind: ethernet
      direction: bidirectional
      label: WAN

    - id: router-01-infra-01
      source: router-01
      target: infra-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: router-01-ha-01
      source: router-01
      target: ha-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

  layouts:
    - id: physical
      label: Topologie physique
      kind: physical
      positions:
        internet:
          column: 0
          row: 1
        router-01:
          column: 1
          row: 1
        infra-01:
          column: 2
          row: 0
        ha-01:
          column: 2
          row: 2
