infrastructure:
  id: ohana-house
  name: Ohana House
  environment: production

metadata:
  version: "1.2"
  tags:
    - production
    - home

nodes:
  - id: infra-01
    name: INFRA-01
    description: Serveur des services d'infrastructure
    endpoint:
      type: ip
      address: 192.168.1.10

  - id: zwave-01
    name: ZWAVE-01
    description: Passerelle Z-Wave et serveur DNS principal
    endpoint:
      type: ip
      address: 192.168.1.11

  - id: linky-01
    name: LINKY-01
    description: Téléinformation et serveur DNS secondaire
    endpoint:
      type: ip
      address: 192.168.1.12

  - id: ha-01
    name: HA-01
    description: Home Assistant et broker MQTT principal
    endpoint:
      type: ip
      address: 192.168.1.20

services:
  - id: dhcp-primary
    name: DHCP principal
    type: dhcp
    node: infra-01
    port: 67
    implementation: dnsmasq
    enabled: true
    critical: true

  - id: ntp-primary
    name: Référence temporelle
    type: ntp
    node: infra-01
    port: 123
    implementation: NTP
    enabled: true
    critical: true

  - id: dns-primary
    name: DNS principal
    type: dns
    node: zwave-01
    port: 53
    implementation: AdGuard Home
    enabled: true
    critical: true

  - id: zwave-primary
    name: Z-Wave JS UI
    type: zwave
    node: zwave-01
    implementation: Z-Wave JS UI
    enabled: true
    critical: false

  - id: dns-secondary
    name: DNS secondaire
    type: dns
    node: linky-01
    port: 53
    implementation: AdGuard Home
    enabled: true
    critical: true

  - id: teleinformation
    name: Téléinformation
    type: teleinformation
    node: linky-01
    implementation: Publication MQTT
    enabled: true
    critical: false

  - id: mqtt-primary
    name: MQTT principal
    type: mqtt
    node: ha-01
    port: 1883
    implementation: Mosquitto
    enabled: true
    critical: true

  - id: home-assistant
    name: Home Assistant
    type: home_assistant
    node: ha-01
    port: 8123
    implementation: Home Assistant
    enabled: true
    critical: true

topology:
  metadata:
    description: Architecture physique Ohana-House.
    version: 2

  devices:
    - id: internet
      label: Internet
      kind: internet

    - id: box-01
      label: BOX-01
      kind: router
      address: 192.168.1.1
      metadata:
        role: internet_gateway

    - id: sw-01
      label: SW-01
      kind: switch
      metadata:
        role: core_switch

    - id: sw-02
      label: SW-02
      kind: switch
      metadata:
        role: backbone_switch

    - id: sw-03
      label: SW-03
      kind: switch
      metadata:
        role: home_automation_switch

    - id: ap-01
      label: AP-01
      kind: access_point
      address: 192.168.1.99
      metadata:
        role: wireless_access_point

    - id: infra-01
      label: INFRA-01
      kind: raspberry_pi
      node: infra-01
      metadata:
        role: infrastructure_server

    - id: zwave-01
      label: ZWAVE-01
      kind: raspberry_pi
      node: zwave-01
      metadata:
        role: home_automation_gateway

    - id: linky-01
      label: LINKY-01
      kind: raspberry_pi
      node: linky-01
      metadata:
        role: teleinformation_gateway

    - id: ha-01
      label: HA-01
      kind: home_assistant
      node: ha-01
      metadata:
        role: home_automation_controller

  links:
    - id: internet-box-01
      source: internet
      target: box-01
      kind: ethernet
      direction: bidirectional
      label: WAN
      metadata:
        role: internet_uplink

    - id: box-01-sw-01
      source: box-01
      target: sw-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 2,5 Gb
      bandwidth_mbps: 2500

    - id: sw-01-sw-02
      source: sw-01
      target: sw-02
      kind: ethernet
      direction: bidirectional
      label: Backbone 10 Gb
      bandwidth_mbps: 10000

    - id: sw-02-sw-03
      source: sw-02
      target: sw-03
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: sw-01-ap-01
      source: sw-01
      target: ap-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: sw-02-infra-01
      source: sw-02
      target: infra-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: sw-03-ha-01
      source: sw-03
      target: ha-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: sw-03-zwave-01
      source: sw-03
      target: zwave-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: ap-01-linky-01
      source: ap-01
      target: linky-01
      kind: wifi
      direction: bidirectional
      label: Wi-Fi 802.11ac

  layouts:
    - id: physical
      label: Topologie physique
      kind: physical
      positions:
        internet:
          column: 0
          row: 1
        box-01:
          column: 1
          row: 1
        sw-01:
          column: 2
          row: 1
        ap-01:
          column: 3
          row: 0
        sw-02:
          column: 3
          row: 1
        infra-01:
          column: 3
          row: 2
        sw-03:
          column: 4
          row: 1
        zwave-01:
          column: 5
          row: 2
        linky-01:
          column: 4
          row: 0
        ha-01:
          column: 5
          row: 1
