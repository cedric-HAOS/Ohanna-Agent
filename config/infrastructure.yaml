infrastructure:
  id: ohanna-house
  name: Ohanna House
  environment: production

metadata:
  version: "1.1"
  tags:
    - production
    - home

nodes:
  - id: infra-01
    name: INFRA-01
    description: Serveur principal de l'infrastructure Ohanna
    endpoint:
      type: ip
      address: 192.168.1.10

services:
  - id: dns-primary
    name: DNS principal
    type: dns
    node: infra-01
    port: 53

topology:
  metadata:
    description: Topologie physique de l'infrastructure Ohanna-House.
    version: 1

  devices:
    - id: internet
      label: Internet
      kind: internet
      metadata:
        role: external_network

    - id: freebox
      label: Freebox Pop
      kind: router
      metadata:
        role: internet_gateway

    - id: sw-01
      label: SW-01
      kind: switch
      metadata:
        role: core_switch
        manufacturer: TRENDnet
        model: TEG-S762

    - id: sw-02
      label: SW-02
      kind: switch
      metadata:
        role: distribution_switch
        manufacturer: TRENDnet
        model: TEG-S762

    - id: sw-03
      label: SW-03
      kind: switch
      metadata:
        role: access_switch
        manufacturer: Linksys

    - id: ap-01
      label: AP-01
      kind: access_point
      metadata:
        role: wireless_access_point
        manufacturer: Linksys
        model: LAPAC1750

    - id: rpi-link
      label: RPI-LINK
      kind: raspberry_pi
      node: infra-01
      metadata:
        role: linky_gateway
        connection: wifi

    - id: ha-green
      label: HA-Green
      kind: home_assistant
      metadata:
        role: home_automation_controller

    - id: rpi-zwave
      label: RPI-ZWAVE
      kind: raspberry_pi
      metadata:
        role: zwave_gateway

  links:
    - id: internet-freebox
      source: internet
      target: freebox
      kind: ethernet
      direction: bidirectional
      label: WAN
      metadata:
        role: internet_uplink

    - id: freebox-sw-01
      source: freebox
      target: sw-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 2.5 Gb
      bandwidth_mbps: 2500
      metadata:
        role: gateway_uplink

    - id: sw-01-sw-02
      source: sw-01
      target: sw-02
      kind: ethernet
      direction: bidirectional
      label: Ethernet 10 Gb
      bandwidth_mbps: 10000
      metadata:
        role: network_backbone

    - id: sw-02-sw-03
      source: sw-02
      target: sw-03
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000
      metadata:
        role: access_uplink

    - id: sw-01-ap-01
      source: sw-01
      target: ap-01
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000
      metadata:
        role: wireless_uplink

    - id: ap-01-rpi-link
      source: ap-01
      target: rpi-link
      kind: wifi
      direction: bidirectional
      label: Wi-Fi
      metadata:
        role: wireless_access

    - id: sw-03-ha-green
      source: sw-03
      target: ha-green
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

    - id: sw-03-rpi-zwave
      source: sw-03
      target: rpi-zwave
      kind: ethernet
      direction: bidirectional
      label: Ethernet 1 Gb
      bandwidth_mbps: 1000

  layouts:
    - id: ohanna-house-physical
      label: Carte physique Ohanna-House
      kind: physical
      metadata:
        description: Carte physique principale de l'infrastructure.
      positions:
        internet:
          column: 0
          row: 1
        freebox:
          column: 1
          row: 1
        sw-01:
          column: 2
          row: 1
        ap-01:
          column: 3
          row: 0
        sw-02:
          column: 3
          row: 1
        rpi-link:
          column: 4
          row: 0
        sw-03:
          column: 4
          row: 1
        ha-green:
          column: 5
          row: 1
        rpi-zwave:
          column: 5
          row: 2
